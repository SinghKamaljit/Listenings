<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Listenings</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#20264A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#20264A;
    --ink-soft:#3B4272;
    --paper:#EDE7D9;
    --paper-raised:#F6F2E8;
    --brass:#B08D57;
    --brass-bright:#C9A24B;
    --line:#D8CFB8;
    --text:#20264A;
    --text-muted:#6B6F8F;
    --ok:#4C7A5B;
    --danger:#A3432F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces',serif;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  .screen{max-width:520px;margin:0 auto;padding:20px 18px 40px;}

  /* Header */
  .brand{
    display:flex;align-items:baseline;justify-content:space-between;
    padding:18px 4px 22px;user-select:none;
  }
  .brand-mark{font-size:22px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .brand-name{font-size:19px;margin:0;color:var(--ink);}
  .brand-tag{font-size:11px;color:var(--text-muted);letter-spacing:.04em;display:block;margin-top:2px;}

  /* Entry */
  .card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:10px;
    padding:22px;
  }
  .field-label{font-size:12px;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;display:block;}
  input[type=text],input[type=number]{
    width:100%;
    font-family:'Fraunces',serif;
    font-size:22px;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fff;
    color:var(--ink);
  }
  input:focus{outline:2px solid var(--brass);outline-offset:1px;}
  button{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    padding:13px 18px;
  }
  .btn-primary{background:var(--ink);color:#fff;width:100%;margin-top:14px;}
  .btn-primary:disabled{opacity:.4;cursor:default;}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
  .btn-ghost.recording{background:var(--danger);color:#fff;border-color:var(--danger);}
  .btn-danger{background:var(--danger);color:#fff;}
  .hint{font-size:12.5px;color:var(--text-muted);margin-top:16px;line-height:1.5;}

  /* Room header */
  .room-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .room-title{font-size:20px;margin:0;}
  .room-sub{font-size:12px;color:var(--text-muted);}
  .status-pill{
    font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;
    padding:4px 9px;border-radius:20px;
  }
  .status-active{background:#DCE7DE;color:var(--ok);}
  .status-resolved{background:#EFE0D2;color:var(--brass);}

  /* Seats grid */
  .seat-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:9px;
    margin-bottom:18px;
  }
  .seat{
    border:1px solid var(--line);
    background:var(--paper-raised);
    border-radius:9px;
    padding:12px 6px;
    text-align:center;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .seat-code{font-family:'Fraunces',serif;font-size:17px;display:block;}
  .seat-state{font-size:10px;color:var(--text-muted);display:block;margin-top:3px;letter-spacing:.03em;text-transform:uppercase;}
  .seat.mine{border-color:var(--ink);background:var(--ink);}
  .seat.mine .seat-code,.seat.mine .seat-state{color:#fff;}
  .seat.taken:not(.mine){opacity:.5;cursor:default;}
  .seat.silent{border-style:dashed;}

  /* Thread */
  .thread-wrap{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  .thread{
    max-height:52vh;
    overflow-y:auto;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .msg{max-width:88%;}
  .msg-meta{font-size:11px;color:var(--text-muted);margin-bottom:2px;}
  .msg-body{
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    padding:9px 12px;
  }
  .msg.self .msg-body{background:#E4E9F5;border-color:#C7D0EA;}
  .msg.resolution .msg-body{background:#FBF1DF;border-color:var(--brass);}
  .msg.resolution .msg-meta{color:var(--brass);font-weight:600;}
  .empty-thread{color:var(--text-muted);font-size:13.5px;text-align:center;padding:30px 10px;}

  .msg-audio-row{display:flex;align-items:center;gap:8px;}
  .play-btn{
    width:30px;height:30px;border-radius:50%;border:none;flex-shrink:0;
    background:var(--ink);color:#fff;font-size:13px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .msg.self .play-btn{background:var(--ink-soft);}
  .msg.resolution .play-btn{background:var(--brass);color:#000;}
  .msg-progress-wrap{flex:1;}
  .msg-progress-bg{background:var(--line);border-radius:4px;height:4px;overflow:hidden;}
  .msg-progress-fill{background:var(--ink);height:100%;width:0%;}
  .msg.self .msg-progress-fill{background:var(--ink-soft);}
  .msg.resolution .msg-progress-fill{background:var(--brass);}
  .msg-dur{font-size:10.5px;color:var(--text-muted);margin-top:2px;}
  .msg-dl{margin-top:8px;width:100%;border:1px solid var(--brass);background:transparent;color:var(--brass);border-radius:8px;padding:7px;font-size:12px;}

  .composer{
    display:flex;gap:8px;padding:10px;border-top:1px solid var(--line);align-items:center;
  }
  .composer-voice{flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:0;}
  .rec-timer-line{font-size:11px;color:var(--text-muted);min-height:14px;}
  .rec-bar-track{width:100%;height:3px;background:var(--line);border-radius:2px;overflow:hidden;}
  .rec-bar-fill{height:100%;width:0%;background:var(--danger);}
  .rec-btn{padding:0 16px;height:38px;background:var(--ink);color:#fff;white-space:nowrap;}
  .rec-btn.recording{background:var(--danger);}
  .rec-btn:disabled{opacity:.4;}
  .watch-only{padding:12px;text-align:center;font-size:12.5px;color:var(--text-muted);border-top:1px solid var(--line);}

  .toolbar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .toolbar button{flex:1;}

  /* Admin overlay */
  .overlay{
    position:fixed;inset:0;background:rgba(32,38,74,.72);
    display:flex;align-items:flex-end;justify-content:center;z-index:50;
  }
  .sheet{
    background:var(--paper-raised);
    width:100%;max-width:520px;
    border-radius:16px 16px 0 0;
    padding:20px;
  }
  .sheet h3{margin:0 0 14px;font-size:17px;}
  .confirm-box{
    border:1px solid var(--danger);
    background:#FBE9E4;
    border-radius:8px;
    padding:12px;
    font-size:13.5px;
    margin-top:12px;
    line-height:1.5;
  }
  .row{display:flex;gap:8px;margin-top:10px;}
  .row button{flex:1;}
  .link-line{
    display:flex;gap:8px;align-items:center;
    background:#fff;border:1px solid var(--line);border-radius:8px;
    padding:9px 11px;margin-top:6px;font-size:13px;color:var(--text-muted);
  }
</style>
</head>
<body>

<div class="screen">

  <div class="brand">
    <div>
      <h1 class="brand-name">Listenings</h1>
      <span class="brand-tag">No text, only voice.</span>
    </div>
    <div class="brand-mark" id="brandMark">🙏</div>
  </div>

  <!-- ENTRY VIEW -->
  <div id="entryView" class="card">
    <span class="field-label">Room number</span>
    <input type="number" id="roomInput" placeholder="e.g. 1" inputmode="numeric">
    <button class="btn-primary" id="enterRoomBtn">Enter room</button>
    <p class="hint">Sit at the seat you were told to. Rooms not part of anything until someone sits.</p>
  </div>

  <!-- ROOM VIEW -->
  <div id="roomView" style="display:none;">
    <div class="room-head">
      <div>
        <h2 class="room-title" id="roomTitleText">Room —</h2>
        <span class="room-sub" id="roomSub">loading…</span>
      </div>
      <span class="status-pill status-active" id="statusPill">Active</span>
    </div>

    <div class="seat-grid" id="seatGrid"></div>

    <div class="thread-wrap">
      <div class="thread" id="thread"><div class="empty-thread">No voices yet.</div></div>
      <div class="composer" id="composer" style="display:none;">
        <div class="composer-voice">
          <div class="rec-timer-line" id="recTimerLine"></div>
          <div class="rec-bar-track"><div class="rec-bar-fill" id="recBarFill"></div></div>
        </div>
        <button class="rec-btn" id="recMainBtn">Hold to speak</button>
      </div>
      <div class="watch-only" id="watchOnly" style="display:none;">You are seated as a silent witness — you can listen, but this seat does not speak.</div>
    </div>

    <div class="toolbar" id="evaluatorTools" style="display:none;">
      <button class="btn-ghost" id="resolveBtn">Hold for resolution</button>
      <button class="btn-ghost" id="exportBtn" style="display:none;">Save resolution</button>
    </div>

    <button class="btn-ghost" style="width:100%;margin-top:14px;" id="leaveRoomBtn">Leave room</button>
  </div>
</div>

<!-- ADMIN SHEET -->
<div class="overlay" id="adminOverlay" style="display:none;">
  <div class="sheet">
    <h3>Admin</h3>
    <span class="field-label">Room to manage</span>
    <input type="number" id="adminRoomInput" placeholder="Room number" inputmode="numeric">
    <div class="link-line" id="adminRoomStatus">—</div>
    <div class="row">
      <button class="btn-danger" id="adminClearBtn">Clear room</button>
      <button class="btn-ghost" id="adminCloseBtn">Close</button>
    </div>
    <div class="confirm-box" id="adminConfirmBox" style="display:none;"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase, ref, set, get, remove, push, onValue, onChildAdded
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── CONFIG (same Firebase project + Cloudinary account as Over To You) ──
const firebaseConfig = {
  apiKey:            "AIzaSyAlWc8AFDTF42DyrqlXOFMv5qeFseIxwZk",
  authDomain:        "over-to-you.firebaseapp.com",
  projectId:         "over-to-you",
  storageBucket:     "over-to-you.firebasestorage.app",
  databaseURL:       "https://over-to-you-default-rtdb.asia-southeast1.firebasedatabase.app",
  messagingSenderId: "248483734626",
  appId:             "1:248483734626:web:492766d8b748d7fb875d3b"
};
const CLOUDINARY_CLOUD  = "dqwaiio4d";
const CLOUDINARY_PRESET = "oty123";
const MAX_RECORD_SECS   = 90;

// ── SEAT MODEL (settlement roles, identical in every room) ──
const SEAT_ROLES = [
  {id:"EV",code:"EV",canPost:true},{id:"P1",code:"P1",canPost:true},{id:"P2",code:"P2",canPost:true},
  {id:"A1",code:"A1",canPost:true},{id:"A2",code:"A2",canPost:true},
  {id:"S1",code:"S1",canPost:false},{id:"S2",code:"S2",canPost:false},{id:"S3",code:"S3",canPost:false},
  {id:"S4",code:"S4",canPost:false},{id:"S5",code:"S5",canPost:false}
];
// Room 13: "Tera" — the general discussion room. Ten open speaking seats,
// no evaluator, no resolution. Each seat asks for a name/nickname once, on
// claiming — shown alongside the seat code in the feed, not on the tile.
const TERA_SEATS = Array.from({length:10}, (_,i)=>({id:"T"+(i+1), code:"T"+(i+1), canPost:true}));

function isTeraRoom(roomId){ return roomId === "13"; }
function seatSetFor(roomId){ return isTeraRoom(roomId) ? TERA_SEATS : SEAT_ROLES; }
function seatMeta(roomId, id){ return seatSetFor(roomId).find(s=>s.id===id); }
function isSakshi(id){ const m=seatMeta(currentRoomId,id); return m ? !m.canPost : false; }
function isEvaluator(id){ return id === "EV"; }
function padRoom(n){ return String(n).padStart(2,"0"); }

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// per-device id, used only to tell "mine" apart from other seats — no accounts, no names
let clientId = localStorage.getItem("listenings_client_id");
if (!clientId){ clientId = (crypto.randomUUID ? crypto.randomUUID() : "c"+Date.now()+Math.random()); localStorage.setItem("listenings_client_id", clientId); }

// ── STATE ─────────────────────────────────────
let currentRoomId    = null;
let currentSeatId    = null;
let currentSeatName  = null;
let seatsUnsub        = null;
let mediaStream       = null;
let mediaRecorder     = null;
let audioChunks       = [];
let isRecording       = false;
let recordingIsResolution = false;
let recTimerInterval  = null;
let recAutoStopTimer  = null;
let recSecondsElapsed = 0;
let currentlyPlaying  = null;
let latestResolution  = null;

function roomPath(){ return "listenings_rooms/"+currentRoomId; }

// ── HELPERS ───────────────────────────────────
function escapeHtml(s){ if(!s)return""; return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtTime(s){ if(!s||isNaN(s))return"0:00"; return String(Math.floor(s/60)).padStart(2,"0")+":"+String(Math.floor(s)%60).padStart(2,"0"); }
function padRoomIdFromInput(n){ return padRoom(parseInt(n,10)); }

// ── MICROPHONE ────────────────────────────────
async function initMicrophone(){
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false, sampleRate:44100 }
    });
  } catch(err){
    try { mediaStream = await navigator.mediaDevices.getUserMedia({audio:true}); }
    catch(e){ alert("Microphone access denied — check browser permissions."); }
  }
}
function stopMic(){
  if (mediaStream){ mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
}

// ── MEDIA RECORDER ────────────────────────────
function createMediaRecorder(stream){
  const preferred=["audio/mp4;codecs=mp4a.40.2","audio/mp4","audio/webm;codecs=opus","audio/webm"];
  const opts={ audioBitsPerSecond:128000 };
  for (const mime of preferred){
    if (!MediaRecorder.isTypeSupported(mime)) continue;
    try { return new MediaRecorder(stream,{ mimeType:mime, ...opts }); } catch(e){}
  }
  return new MediaRecorder(stream, opts);
}
function extForRecorder(mr){
  const mime=mr.mimeType||"";
  if (mime.includes("mp4")) return ".m4a";
  if (mime.includes("ogg")) return ".ogg";
  return ".webm";
}

// ── UPLOAD / DOWNLOAD ─────────────────────────
async function uploadAudio(blob, ext, isResolution){
  if (!blob||blob.size===0) throw new Error("Audio blob is empty");
  const fd=new FormData();
  fd.append("file", new File([blob], currentRoomId+"_"+currentSeatId+"_"+Date.now()+ext, {type:blob.type||"audio/webm"}));
  fd.append("upload_preset", CLOUDINARY_PRESET);
  fd.append("resource_type","video");
  fd.append("tags", "autoclear,listenings,room"+currentRoomId+(isResolution?",resolution":""));
  let res;
  try { res=await fetch("https://api.cloudinary.com/v1_1/"+CLOUDINARY_CLOUD+"/video/upload",{method:"POST",body:fd}); }
  catch(e){ throw new Error("Network error: "+e.message); }
  if (!res.ok){
    let detail="HTTP "+res.status;
    try { const eb=await res.json(); detail=eb.error?.message||JSON.stringify(eb); } catch(e){}
    throw new Error("Upload rejected: "+detail);
  }
  const data=await res.json();
  if (!data.secure_url) throw new Error("No URL in response");
  return data.secure_url;
}
async function downloadAudio(url, filename){
  try {
    const res=await fetch(url);
    const blob=await res.blob();
    const objUrl=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=objUrl; a.download=filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(objUrl);
  } catch(e){ alert("Download failed — try long-press on the audio instead."); }
}

// ── ENTRY ─────────────────────────────────────
const entryView = document.getElementById("entryView");
const roomView  = document.getElementById("roomView");
const roomInput = document.getElementById("roomInput");

document.getElementById("enterRoomBtn").addEventListener("click", ()=>{
  const n = roomInput.value.trim();
  if (!n) return;
  goToRoom(n);
});

const initParams = new URLSearchParams(location.search);
if (initParams.get("room")){
  roomInput.value = initParams.get("room");
  goToRoom(initParams.get("room"));
}

async function goToRoom(n){
  const num = parseInt(n,10);
  if (isNaN(num) || num<1 || num>99){ alert("Enter a room number, 1–99"); return; }
  currentRoomId = padRoom(num);
  history.replaceState(null, "", "?room="+num);
  entryView.style.display = "none";
  roomView.style.display  = "block";
  document.getElementById("roomTitleText").textContent = "Room "+currentRoomId;
  document.getElementById("roomSub").textContent = "loading…";

  currentSeatId = localStorage.getItem("listenings_seat_"+currentRoomId) || null;
  currentSeatName = null;
  if (currentSeatId){
    if (isTeraRoom(currentRoomId)){
      try {
        const seatSnap = await get(ref(db, "listenings_rooms/"+currentRoomId+"/seats/"+currentSeatId));
        if (seatSnap.exists()) currentSeatName = seatSnap.val().name || null;
      } catch(e){ console.error(e); }
    }
    if (!isSakshi(currentSeatId)) await initMicrophone();
  }

  if (seatsUnsub) seatsUnsub();
  seatsUnsub = onValue(ref(db, roomPath()+"/seats"), (snap)=>{
    renderRoom(snap.exists()? snap.val() : {});
  }, (err)=>{
    console.error(err);
    document.getElementById("roomSub").textContent = "⚠️ Could not load seats";
  });

  attachFeedListener();
}

// ── SEATS ─────────────────────────────────────
function renderRoom(seatsData){
  const grid = document.getElementById("seatGrid");
  grid.innerHTML = "";
  seatSetFor(currentRoomId).forEach(seat=>{
    const owner = seatsData ? seatsData[seat.id] : null;
    const mine  = currentSeatId === seat.id;
    const taken = !!owner;
    const div = document.createElement("div");
    div.className = "seat"+(mine?" mine":"")+(taken&&!mine?" taken":"")+(!seat.canPost?" silent":"");
    div.innerHTML = '<span class="seat-code">'+seat.code+'</span><span class="seat-state">'+(mine?"You":(taken?"Taken":"Empty"))+'</span>';
    div.addEventListener("click", ()=>handleSeatTap(seat, owner, mine));
    grid.appendChild(div);
  });

  document.getElementById("roomSub").textContent = currentSeatId ? ("Seated as "+currentSeatId) : "Choose your seat";

  const seated = !!currentSeatId;
  const sakshi = seated && isSakshi(currentSeatId);
  document.getElementById("composer").style.display   = (seated && !sakshi) ? "flex"  : "none";
  document.getElementById("watchOnly").style.display   = (seated && sakshi) ? "block" : "none";
  document.getElementById("evaluatorTools").style.display = (currentSeatId==="EV" && !isTeraRoom(currentRoomId)) ? "flex" : "none";
}

async function handleSeatTap(seat, ownerVal, mine){
  const seatId = seat.id;
  if (mine){
    if (!confirm("Leave this seat and free it? You can then tap the correct one.")) return;
    await remove(ref(db, roomPath()+"/seats/"+seatId));
    localStorage.removeItem("listenings_seat_"+currentRoomId);
    currentSeatId = null; currentSeatName = null;
    stopMic();
    return;
  }
  if (ownerVal) return; // taken by someone else

  let name = null;
  if (isTeraRoom(currentRoomId)){
    name = prompt("What should we call you here? (name or nickname — any length is fine)");
    if (name === null) return; // cancelled, don't claim the seat
    name = name.trim();
  }

  const snap = await get(ref(db, roomPath()+"/seats/"+seatId));
  if (snap.exists()){ alert("Someone just took that seat."); return; }
  await set(ref(db, roomPath()+"/seats/"+seatId), { claimedBy: clientId, name: name||null, claimedAt: Date.now() });
  currentSeatId = seatId;
  currentSeatName = name || null;
  localStorage.setItem("listenings_seat_"+currentRoomId, seatId);
  if (seat.canPost) await initMicrophone();
}

document.getElementById("leaveRoomBtn").addEventListener("click", async ()=>{
  if (currentSeatId){
    await remove(ref(db, roomPath()+"/seats/"+currentSeatId));
    localStorage.removeItem("listenings_seat_"+currentRoomId);
    currentSeatId = null; currentSeatName = null;
  }
  stopMic();
  if (seatsUnsub){ seatsUnsub(); seatsUnsub=null; }
  latestResolution = null;
  roomView.style.display  = "none";
  entryView.style.display = "block";
  history.replaceState(null, "", location.pathname);
});

// ── THREAD (voice bubbles) ────────────────────
function attachFeedListener(){
  const msgsRef = ref(db, roomPath()+"/messages");
  onChildAdded(msgsRef, (snap)=>{
    const empty = document.querySelector("#thread .empty-thread");
    if (empty) empty.remove();
    appendBubble(snap.key, snap.val());
  });
}
function appendBubble(key, msg){
  const thread = document.getElementById("thread");
  const self = msg.seat === currentSeatId;
  const div = document.createElement("div");
  div.className = "msg"+(self?" self":"")+(msg.isResolution?" resolution":"");
  div.dataset.key = key;
  const code = (msg.seat||"");
  const codeLabel = msg.name ? (code+" — "+msg.name) : code;
  const label = (msg.isResolution ? "Resolution — " : "") + codeLabel;
  const totalDur = msg.duration || 0;
  div.innerHTML =
    '<div class="msg-meta"></div>'+
    '<div class="msg-body"><div class="msg-audio-row">'+
      '<button class="play-btn">▶</button>'+
      '<div class="msg-progress-wrap"><div class="msg-progress-bg"><div class="msg-progress-fill"></div></div>'+
      '<div class="msg-dur">'+fmtTime(totalDur)+'</div></div>'+
    '</div>'+
    (msg.isResolution ? '<button class="msg-dl">Save resolution to device</button>' : '')+
    '</div>';
  div.querySelector(".msg-meta").textContent = label;
  const playBtn=div.querySelector(".play-btn");
  const fillEl =div.querySelector(".msg-progress-fill");
  const durEl  =div.querySelector(".msg-dur");
  playBtn.addEventListener("click", ()=>togglePlay(msg.audioUrl, playBtn, fillEl, durEl, totalDur));
  const dlBtn=div.querySelector(".msg-dl");
  if (dlBtn) dlBtn.addEventListener("click", ()=>downloadAudio(msg.audioUrl, "resolution_room"+currentRoomId+"_"+msg.timestamp+".webm"));
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;

  if (msg.isResolution){
    latestResolution = msg;
    document.getElementById("statusPill").textContent = "Resolved";
    document.getElementById("statusPill").className = "status-pill status-resolved";
    const exportBtn = document.getElementById("exportBtn");
    exportBtn.style.display = (currentSeatId==="EV") ? "inline-block" : "none";
  }
}
function togglePlay(url, btn, fillEl, durEl, totalDur){
  if (currentlyPlaying && currentlyPlaying.btn===btn){
    if (currentlyPlaying.audio.paused){ currentlyPlaying.audio.play(); btn.textContent="⏸"; }
    else { currentlyPlaying.audio.pause(); btn.textContent="▶"; }
    return;
  }
  if (currentlyPlaying){ currentlyPlaying.audio.pause(); currentlyPlaying.btn.textContent="▶"; }
  const audio=new Audio(url);
  currentlyPlaying={ audio, btn };
  btn.textContent="⏸";
  audio.addEventListener("timeupdate", ()=>{
    const d = audio.duration || totalDur || 1;
    fillEl.style.width = Math.min(100,(audio.currentTime/d)*100)+"%";
    durEl.textContent = fmtTime(audio.currentTime)+" / "+fmtTime(totalDur||audio.duration||0);
  });
  audio.addEventListener("ended", ()=>{ btn.textContent="▶"; fillEl.style.width="0%"; durEl.textContent=fmtTime(totalDur); currentlyPlaying=null; });
  audio.addEventListener("error", ()=>{ btn.textContent="▶"; currentlyPlaying=null; });
  audio.play().catch(()=>{ btn.textContent="▶"; });
}

// ── RECORDING (press and hold; normal or resolution) ──────
const recBtn = document.getElementById("recMainBtn");
const resBtn = document.getElementById("resolveBtn");
function startRecording(asResolution){
  if (!mediaStream){ alert("Microphone not ready yet — try again in a second."); return; }
  if (isRecording) return;
  recordingIsResolution = !!asResolution;
  const activeBtn = asResolution ? resBtn : recBtn;
  try {
    audioChunks=[];
    mediaRecorder=createMediaRecorder(mediaStream);
    mediaRecorder.ondataavailable=(ev)=>{ if(ev.data&&ev.data.size>0) audioChunks.push(ev.data); };
    mediaRecorder.onstop=sendRecording;
    mediaRecorder.onerror=(err)=>{ console.error(err); stopRecording(false); };
    mediaRecorder.start(250);
    isRecording=true;
    activeBtn.classList.add("recording");
    activeBtn.textContent = asResolution ? "Recording resolution…" : "Recording…";
    startRecTimer();
  } catch(err){ console.error(err); alert("Could not start recording."); }
}
function stopRecording(shouldSend){
  if (!isRecording) return;
  isRecording=false;
  if (mediaRecorder && mediaRecorder.state==="recording"){
    if (!shouldSend) mediaRecorder.onstop=null;
    mediaRecorder.stop();
  }
  stopRecTimer();
  recBtn.classList.remove("recording"); recBtn.textContent="Hold to speak";
  resBtn.classList.remove("recording"); resBtn.textContent="Hold for resolution";
}
function startRecTimer(){
  recSecondsElapsed=0;
  const line=document.getElementById("recTimerLine");
  const bar =document.getElementById("recBarFill");
  bar.style.transition="none"; bar.style.width="0%";
  requestAnimationFrame(()=>{ bar.style.transition="width "+MAX_RECORD_SECS+"s linear"; bar.style.width="100%"; });
  line.textContent="● "+fmtTime(0);
  recTimerInterval=setInterval(()=>{
    recSecondsElapsed++;
    line.textContent="● "+fmtTime(recSecondsElapsed);
  },1000);
  recAutoStopTimer=setTimeout(()=>{
    if (mediaRecorder && mediaRecorder.state==="recording") mediaRecorder.stop();
  }, MAX_RECORD_SECS*1000);
}
function stopRecTimer(){
  clearInterval(recTimerInterval); clearTimeout(recAutoStopTimer);
  recTimerInterval=recAutoStopTimer=null;
  document.getElementById("recTimerLine").textContent="";
  const bar=document.getElementById("recBarFill");
  bar.style.transition="none"; bar.style.width="0%";
}
async function sendRecording(){
  const dur=recSecondsElapsed;
  const wasResolution=recordingIsResolution;
  if (!audioChunks.length) return;
  recBtn.disabled=true; resBtn.disabled=true;
  const activeBtn = wasResolution ? resBtn : recBtn;
  activeBtn.textContent="Sending…";
  try {
    const ext = extForRecorder(mediaRecorder);
    const blob = new Blob(audioChunks, {type:mediaRecorder.mimeType||"audio/webm"});
    const audioUrl = await uploadAudio(blob, ext, wasResolution);
    await push(ref(db, roomPath()+"/messages"), {
      seat:currentSeatId, name: currentSeatName||null, audioUrl, duration:dur, timestamp:Date.now(), isResolution: wasResolution
    });
  } catch(err){ console.error(err); alert("Send failed — "+err.message); }
  finally {
    recBtn.disabled=false; resBtn.disabled=false;
    recBtn.textContent="Hold to speak"; resBtn.textContent="Hold for resolution";
  }
}
recBtn.addEventListener("pointerdown", (e)=>{ e.preventDefault(); startRecording(false); });
recBtn.addEventListener("pointerup",    ()=>{ if(isRecording) stopRecording(true); });
recBtn.addEventListener("pointerleave", ()=>{ if(isRecording) stopRecording(true); });
recBtn.addEventListener("pointercancel",()=>{ if(isRecording) stopRecording(true); });
resBtn.addEventListener("pointerdown", (e)=>{ e.preventDefault(); startRecording(true); });
resBtn.addEventListener("pointerup",    ()=>{ if(isRecording) stopRecording(true); });
resBtn.addEventListener("pointerleave", ()=>{ if(isRecording) stopRecording(true); });
resBtn.addEventListener("pointercancel",()=>{ if(isRecording) stopRecording(true); });

document.getElementById("exportBtn").addEventListener("click", ()=>{
  if (!latestResolution) return;
  downloadAudio(latestResolution.audioUrl, "resolution_room"+currentRoomId+"_"+latestResolution.timestamp+".webm");
});

document.addEventListener("visibilitychange", ()=>{ if (document.hidden && isRecording) stopRecording(true); });
window.addEventListener("beforeunload", ()=>{ stopMic(); });

// ── ADMIN: folded-hands x3, manage any room, with confirm ──
let tapTimes = [];
document.getElementById("brandMark").addEventListener("click", ()=>{
  const now = Date.now();
  tapTimes.push(now);
  tapTimes = tapTimes.filter(t=>now-t<1200);
  if (tapTimes.length>=3){ tapTimes=[]; openAdmin(); }
});

const adminOverlay     = document.getElementById("adminOverlay");
const adminRoomInput   = document.getElementById("adminRoomInput");
const adminRoomStatus  = document.getElementById("adminRoomStatus");
const adminConfirmBox  = document.getElementById("adminConfirmBox");

function openAdmin(){
  adminConfirmBox.style.display = "none";
  adminRoomInput.value = currentRoomId ? parseInt(currentRoomId,10) : "";
  adminOverlay.style.display = "flex";
  refreshAdminRoomStatus();
}
document.getElementById("adminCloseBtn").addEventListener("click", ()=>adminOverlay.style.display="none");
adminRoomInput.addEventListener("input", refreshAdminRoomStatus);

async function refreshAdminRoomStatus(){
  const n = adminRoomInput.value.trim();
  if (!n){ adminRoomStatus.textContent="—"; return; }
  const id = padRoomIdFromInput(n);
  const snap = await get(ref(db, "listenings_rooms/"+id));
  if (!snap.exists()){ adminRoomStatus.textContent = "Room "+n+": not created yet."; return; }
  const data = snap.val() || {};
  const seatCount = data.seats ? Object.keys(data.seats).length : 0;
  const msgCount  = data.messages ? Object.keys(data.messages).length : 0;
  adminRoomStatus.textContent = "Room "+n+" — "+seatCount+" seated — "+msgCount+" voice message(s)";
}

document.getElementById("adminClearBtn").addEventListener("click", ()=>{
  const n = adminRoomInput.value.trim();
  if (!n) return;
  adminConfirmBox.style.display = "block";
  adminConfirmBox.innerHTML = "Do you really want to clear the voices of Room "+n+"? This removes every seat and every voice message. This cannot be undone."+
    '<div class="row"><button class="btn-danger" id="confirmYes">Yes, clear it</button><button class="btn-ghost" id="confirmNo">No, keep it</button></div>';
  document.getElementById("confirmNo").addEventListener("click", ()=>{ adminConfirmBox.style.display="none"; });
  document.getElementById("confirmYes").addEventListener("click", ()=>clearRoom(n));
});

async function clearRoom(n){
  const id = padRoomIdFromInput(n);
  await remove(ref(db, "listenings_rooms/"+id));
  if (currentRoomId === id){
    localStorage.removeItem("listenings_seat_"+id);
    currentSeatId = null;
    latestResolution = null;
  }
  adminConfirmBox.style.display = "none";
  refreshAdminRoomStatus();
  alert("Room "+n+" is cleared and free for a new matter.");
}
</script>
